name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Install + syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check app.js
        run: node --check app.js

      - name: Verify schema.sql is readable
        run: test -s schema.sql

      - name: Verify lab mapping CSV is readable
        run: test -s lab_mapping_variants.csv

      - name: npm audit (high severity, non-blocking)
        run: npm audit --audit-level=high || true
